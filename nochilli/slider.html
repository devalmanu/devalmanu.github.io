<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Слайдер товара | Swiper + Fancybox</title>
    
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <!-- Fancybox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        /* Контейнер для нескольких слайдеров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-container {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }

        /* Стили для главного слайдера */
        .main-swiper {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #f0f0f0;
            position: relative;
        }

        .main-swiper .swiper-slide {
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
            position: relative;
        }

        .main-swiper .swiper-slide img {
            width: 100%;
            height: 500px;
            display: block;
            object-fit: contain;
        }

        .main-swiper .swiper-slide video {
            width: 100%;
            height: 500px;
            display: block;
            object-fit: contain;
            background: #000;
        }

        /* Видео контейнер для правильного отображения */
        .video-container {
            width: 100%;
            height: 500px;
            position: relative;
            background: #000;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Оверлей для видео */
        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 2;
        }

        .video-container:hover .video-overlay {
            opacity: 1;
        }

        .play-button {
            width: 80px;
            height: 80px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            transition: transform 0.3s ease;
        }

        .video-container:hover .play-button {
            transform: scale(1.1);
        }

        /* Индикатор видео */
        .video-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            z-index: 2;
            pointer-events: none;
        }

        /* Стили для thumbnails */
        .thumb-swiper {
            width: 100%;
            padding: 8px 0;
            position: relative;
        }

        .thumb-swiper .swiper-slide {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
            opacity: 0.6;
            border: 2px solid transparent;
            background: #f5f5f5;
            position: relative;
            height: auto;
        }

        .thumb-swiper .swiper-slide-thumb-active {
            opacity: 1;
            border-color: #007aff;
        }

        .thumb-swiper .swiper-slide:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }

        .thumb-swiper .swiper-slide img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 1 / 1;
        }

        .thumb-swiper .swiper-slide video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            aspect-ratio: 1 / 1;
            pointer-events: none;
        }

        /* Иконка видео на миниатюре */
        .thumb-video-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            pointer-events: none;
            z-index: 2;
        }

        /* Навигационные кнопки для thumbnails */
        .thumb-swiper .swiper-button-next,
        .thumb-swiper .swiper-button-prev {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
        }

        .thumb-swiper .swiper-button-next:after,
        .thumb-swiper .swiper-button-prev:after {
            font-size: 18px;
            color: white;
        }

        .thumb-swiper .swiper-button-next.swiper-button-disabled,
        .thumb-swiper .swiper-button-prev.swiper-button-disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Кастомный скроллбар для thumbnails */
        .thumb-swiper .swiper-scrollbar {
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            bottom: 0;
        }

        .thumb-swiper .swiper-scrollbar-drag {
            background: #007aff;
            border-radius: 10px;
        }

        /* Адаптивность */
        @media (max-width: 768px) {
            .products-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .product-container {
                padding: 12px;
            }
            
            .thumb-swiper .swiper-button-next,
            .thumb-swiper .swiper-button-prev {
                display: none;
            }

            .main-swiper .swiper-slide img,
            .main-swiper .swiper-slide video,
            .video-container {
                height: 300px;
            }

            .play-button {
                width: 60px;
                height: 60px;
                font-size: 30px;
            }
        }

        /* Информация о товаре */
        .product-info {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e0e0e0;
        }

        .product-title {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        .product-price {
            font-size: 24px;
            font-weight: 700;
            color: #007aff;
            margin-bottom: 16px;
        }

        .product-description {
            color: #666;
            line-height: 1.6;
        }

        /* Стили для видео в fancybox */
        .fancybox__video {
            max-width: 90vw;
            max-height: 90vh;
            background: #000;
            cursor: pointer;
        }
        
        .fancybox__video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* Стили для оверлея видео в fancybox */
        .video-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        .video-wrapper .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            transition: opacity 0.3s ease;
        }
        
        .video-wrapper .play-overlay.hide {
            opacity: 0;
            pointer-events: none;
        }
        
        .video-wrapper .big-play-button {
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #007aff;
            font-size: 50px;
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        
        .video-wrapper .big-play-button:hover {
            transform: scale(1.1);
            background: white;
        }
        
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

    <script>
        // Класс для управления независимыми слайдерами
        class ProductSlider {
            constructor(container) {
                this.container = container;
                this.sliderId = container.getAttribute('data-slider-id');
                this.mainSwiperElement = container.querySelector('[data-main-slider]');
                this.thumbSwiperElement = container.querySelector('[data-thumb-slider]');
                this.mainSwiper = null;
                this.thumbSwiper = null;
                this.currentVideoElement = null; // Храним текущее видео в fancybox
                
                this.init();
            }
            
            init() {
                this.initSwipers();
                this.bindEvents();
                this.updateNavigationButtons();
            }
            
            initSwipers() {
                // Настройки для thumbnails
                let thumbConfig = {
                    slidesPerView: 4,
                    spaceBetween: 12,
                    grid: {
                        rows: 2,
                        fill: 'row'
                    },
                    navigation: {
                        nextEl: this.thumbSwiperElement.querySelector('.swiper-button-next'),
                        prevEl: this.thumbSwiperElement.querySelector('.swiper-button-prev'),
                    },
                    watchSlidesProgress: true,
                    watchSlidesVisibility: true,
                    scrollbar: {
                        el: this.thumbSwiperElement.querySelector('.swiper-scrollbar'),
                        hide: false,
                        draggable: true,
                    },
                    freeMode: true,
                    freeModeMomentum: true,
                    freeModeMomentumRatio: 0.5,
                    updateOnWindowResize: true
                };
                
                // Адаптивные настройки
                thumbConfig.breakpoints = {
                    0: {
                        slidesPerView: 3,
                        grid: {
                            rows: 1,
                            fill: 'row'
                        },
                        spaceBetween: 8,
                        freeMode: true
                    },
                    768: {
                        slidesPerView: 4,
                        grid: {
                            rows: 2,
                            fill: 'row'
                        },
                        spaceBetween: 12,
                        freeMode: true
                    },
                    1024: {
                        slidesPerView: 4,
                        grid: {
                            rows: 2,
                            fill: 'row'
                        },
                        spaceBetween: 12,
                        freeMode: true
                    }
                };
                
                // Инициализация главного слайдера
                this.mainSwiper = new Swiper(this.mainSwiperElement, {
                    loop: true,
                    spaceBetween: 20,
                    speed: 400,
                    thumbs: {
                        swiper: null
                    },
                    on: {
                        slideChange: () => {
                            // Останавливаем видео при смене слайда
                            const videos = this.mainSwiperElement.querySelectorAll('video');
                            videos.forEach(video => {
                                video.pause();
                                video.currentTime = 0;
                            });
                        }
                    }
                });
                
                // Инициализация слайдера миниатюр
                this.thumbSwiper = new Swiper(this.thumbSwiperElement, thumbConfig);
                
                // Связываем слайдеры
                this.mainSwiper.params.thumbs.swiper = this.thumbSwiper;
                this.mainSwiper.thumbs.init();
            }
            
            updateNavigationButtons() {
                if (this.thumbSwiper) {
                    const updateButtons = () => {
                        const isBeginning = this.thumbSwiper.isBeginning;
                        const isEnd = this.thumbSwiper.isEnd;
                        const nextBtn = this.thumbSwiperElement.querySelector('.swiper-button-next');
                        const prevBtn = this.thumbSwiperElement.querySelector('.swiper-button-prev');
                        
                        if (nextBtn) {
                            if (isEnd) {
                                nextBtn.classList.add('swiper-button-disabled');
                            } else {
                                nextBtn.classList.remove('swiper-button-disabled');
                            }
                        }
                        
                        if (prevBtn) {
                            if (isBeginning) {
                                prevBtn.classList.add('swiper-button-disabled');
                            } else {
                                prevBtn.classList.remove('swiper-button-disabled');
                            }
                        }
                    };
                    
                    this.thumbSwiper.on('slideChange', updateButtons);
                    this.thumbSwiper.on('reachBeginning', updateButtons);
                    this.thumbSwiper.on('reachEnd', updateButtons);
                    updateButtons();
                }
            }
            
            stopCurrentVideo() {
                if (this.currentVideoElement) {
                    this.currentVideoElement.pause();
                    this.currentVideoElement.currentTime = 0;
                    this.currentVideoElement = null;
                }
            }
            
            bindEvents() {
                // Получаем все слайды
                const slides = this.mainSwiperElement.querySelectorAll('.swiper-slide');
                
                // Добавляем обработчик клика на каждый слайд
                slides.forEach((slide, index) => {
                    slide.addEventListener('click', (e) => {
                        e.stopPropagation();
                        
                        // Получаем текущий активный индекс слайда
                        let activeIndex = this.mainSwiper.realIndex;
                        
                        // Собираем все слайды для галереи
                        const items = [];
                        slides.forEach((item) => {
                            const type = item.getAttribute('data-type');
                            
                            if (type === 'video') {
                                const videoUrl = item.getAttribute('data-video-url');
                                const poster = item.getAttribute('data-poster');
                                
                                if (videoUrl) {
                                    // Создаем HTML элемент с видео и оверлеем для ручного управления
                                    const videoHtml = `
                                        <div class="video-wrapper" style="width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; position: relative;">
                                            <div class="play-overlay">
                                                <div class="big-play-button">▶</div>
                                            </div>
                                            <video controls style="max-width: 90vw; max-height: 90vh; width: auto; height: auto; object-fit: contain;" poster="${poster || ''}">
                                                <source src="${videoUrl}" type="video/mp4">
                                                Ваш браузер не поддерживает видео.
                                            </video>
                                        </div>
                                    `;
                                    
                                    items.push({
                                        src: videoHtml,
                                        type: 'html',
                                        options: {
                                            width: 900,
                                            height: 600,
                                            autoSize: true
                                        }
                                    });
                                }
                            } else if (type === 'image') {
                                const imgUrl = item.getAttribute('data-src');
                                if (imgUrl) {
                                    items.push({
                                        src: imgUrl,
                                        type: 'image'
                                    });
                                } else {
                                    const img = item.querySelector('img');
                                    if (img && img.src) {
                                        items.push({
                                            src: img.src,
                                            type: 'image'
                                        });
                                    }
                                }
                            }
                        });
                        
                        // Открываем fancybox
                        if (items.length > 0) {
                            // Останавливаем текущее видео если есть
                            this.stopCurrentVideo();
                            
                            Fancybox.show(items, {
                                startIndex: activeIndex,
                                infinite: true,
                                closeButton: true,
                                dragToClose: true,
                                Toolbar: {
                                    display: {
                                        left: ["infobar"],
                                        middle: ["zoomIn", "zoomOut", "toggle1to1", "rotateCCW", "rotateCW"],
                                        right: ["slideshow", "thumbs", "close"],
                                    },
                                },
                                on: {
                                    ready: (fancybox) => {
                                        console.log('Fancybox ready');
                                        
                                        // Находим видео и оверлей в fancybox
                                        const videoWrapper = fancybox.container.querySelector('.video-wrapper');
                                        if (videoWrapper) {
                                            const video = videoWrapper.querySelector('video');
                                            const playOverlay = videoWrapper.querySelector('.play-overlay');
                                            
                                            if (video && playOverlay) {
                                                // Сохраняем ссылку на текущее видео
                                                this.currentVideoElement = video;
                                                
                                                // Добавляем обработчик клика на оверлей
                                                playOverlay.addEventListener('click', (e) => {
                                                    e.stopPropagation();
                                                    video.play();
                                                    playOverlay.classList.add('hide');
                                                });
                                                
                                                // Добавляем обработчик паузы для показа оверлея
                                                video.addEventListener('pause', () => {
                                                    if (video.paused && !video.ended) {
                                                        playOverlay.classList.remove('hide');
                                                    }
                                                });
                                                
                                                // Добавляем обработчик воспроизведения для скрытия оверлея
                                                video.addEventListener('play', () => {
                                                    playOverlay.classList.add('hide');
                                                });
                                                
                                                // Добавляем обработчик окончания видео
                                                video.addEventListener('ended', () => {
                                                    playOverlay.classList.remove('hide');
                                                    video.currentTime = 0;
                                                });
                                            }
                                        }
                                    },
                                    slideChange: (fancybox) => {
                                        // При смене слайда останавливаем видео
                                        this.stopCurrentVideo();
                                        
                                        // Обновляем ссылку на новое видео
                                        setTimeout(() => {
                                            const videoWrapper = fancybox.container.querySelector('.video-wrapper');
                                            if (videoWrapper) {
                                                const video = videoWrapper.querySelector('video');
                                                if (video) {
                                                    this.currentVideoElement = video;
                                                    
                                                    // Показываем оверлей для нового видео
                                                    const playOverlay = videoWrapper.querySelector('.play-overlay');
                                                    if (playOverlay) {
                                                        playOverlay.classList.remove('hide');
                                                    }
                                                }
                                            }
                                        }, 100);
                                    },
                                    close: () => {
                                        // При закрытии fancybox останавливаем видео
                                        this.stopCurrentVideo();
                                        
                                        // Останавливаем все видео в главном слайдере
                                        const allVideos = this.mainSwiperElement.querySelectorAll('video');
                                        allVideos.forEach(video => {
                                            video.pause();
                                        });
                                    }
                                }
                            });
                        }
                    });
                });
                
                // Предотвращаем воспроизведение видео в миниатюрах
                const thumbSlides = this.thumbSwiperElement.querySelectorAll('.swiper-slide');
                thumbSlides.forEach(thumb => {
                    thumb.addEventListener('click', (e) => {
                        const video = thumb.querySelector('video');
                        if (video) {
                            e.stopPropagation();
                            video.pause();
                        }
                    });
                });
            }
            
            // Метод для обновления размеров
            update() {
                if (this.mainSwiper) this.mainSwiper.update();
                if (this.thumbSwiper) {
                    this.thumbSwiper.update();
                    setTimeout(() => {
                        this.thumbSwiper.update();
                    }, 100);
                }
            }
        }
        
        // Инициализация всех слайдеров на странице
        document.addEventListener('DOMContentLoaded', function() {
            const sliders = [];
            const containers = document.querySelectorAll('.product-container');
            
            containers.forEach(container => {
                const slider = new ProductSlider(container);
                sliders.push(slider);
            });
            
            // Обновляем все слайдеры при изменении размера окна
            let resizeTimer;
            window.addEventListener('resize', function() {
                clearTimeout(resizeTimer);
                resizeTimer = setTimeout(() => {
                    sliders.forEach(slider => slider.update());
                }, 250);
            });
            
            console.log(`Инициализировано ${sliders.length} слайдеров`);
        });
    </script>
</body>
</html>
