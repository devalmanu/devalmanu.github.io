<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Слайдер товара | Swiper + Fancybox</title>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <!-- Fancybox CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f5f5f5;
            padding: 40px 20px;
        }

        /* Контейнер для нескольких слайдеров */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 40px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-slider {
            max-width: 600px;
        }

        .main-swiper {
            margin-bottom: 10px;
        }

        .main-swiper img,
        .main-swiper video {
            width: 100%;
            height: auto;
        }

        /* THUMBS */
        .thumbs-swiper {
            height: auto;
        }

        .thumbs-swiper .swiper-wrapper {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        /* 2 ряда */
        @media (min-width: 768px) {
            .thumbs-swiper .swiper-wrapper {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* мобильный — 1 ряд */
        @media (max-width: 767px) {
            .thumbs-swiper .swiper-wrapper {
                display: flex;
            }

            .thumbs-swiper .swiper-slide {
                width: 25%;
            }
        }

        .thumbs-swiper img,
        .thumbs-swiper video {
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="products-grid">
        <div class="product-slider" id="slider-1">

            <!-- MAIN -->
            <div class="swiper main-swiper">
                <div class="swiper-wrapper">

                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="./img/@1x/main-banner.png">
                            <img src="./img/@1x/main-banner.png" />
                        </a>
                    </div>

                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="video.mp4" data-type="video">
                            <video muted playsinline preload="metadata">
                                <source src="video.mp4" type="video/mp4" />
                            </video>
                        </a>
                    </div>
                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="./img/@1x/main-banner.png">
                            <img src="./img/@1x/main-banner.png" />
                        </a>
                    </div>

                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="video.mp4" data-type="video">
                            <video muted playsinline preload="metadata">
                                <source src="video.mp4" type="video/mp4" />
                            </video>
                        </a>
                    </div>
                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="./img/@1x/main-banner.png">
                            <img src="./img/@1x/main-banner.png" />
                        </a>
                    </div>

                    <div class="swiper-slide">
                        <a data-fancybox="gallery-1" href="video.mp4" data-type="video">
                            <video muted playsinline preload="metadata">
                                <source src="video.mp4" type="video/mp4" />
                            </video>
                        </a>
                    </div>
                </div>
            </div>

            <!-- THUMBS -->
            <div class="swiper thumbs-swiper">
                <div class="swiper-wrapper">

                    <div class="swiper-slide">
                        <img src="./img/@1x/main-banner.png" />
                    </div>

                    <div class="swiper-slide">
                        <video muted>
                            <source src="video.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <div class="swiper-slide">
                        <img src="./img/@1x/main-banner.png" />
                    </div>

                    <div class="swiper-slide">
                        <video muted>
                            <source src="video.mp4" type="video/mp4" />
                        </video>
                    </div>
                    <div class="swiper-slide">
                        <img src="./img/@1x/main-banner.png" />
                    </div>

                    <div class="swiper-slide">
                        <video muted>
                            <source src="video.mp4" type="video/mp4" />
                        </video>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui@5/dist/fancybox/fancybox.umd.js"></script>

    <script>
        document.querySelectorAll('.product-slider').forEach((slider, index) => {

            const main = slider.querySelector('.main-swiper');
            const thumbs = slider.querySelector('.thumbs-swiper');

            const thumbsSwiper = new Swiper(thumbs, {
                slidesPerView: 4,
                spaceBetween: 8,
                watchSlidesProgress: true,
            });

            const mainSwiper = new Swiper(main, {
                spaceBetween: 10,
                thumbs: {
                    swiper: thumbsSwiper,
                },
            });

        });

        Fancybox.bind("[data-fancybox]", {

            on: {
                reveal: (fancybox, slide) => {
                    // авто play видео
                    const video = slide.$el.querySelector("video");
                    if (video) video.play();
                },

                change: (fancybox) => {
                    // стоп всех видео при смене слайда
                    document.querySelectorAll(".fancybox__container video").forEach(v => {
                        v.pause();
                        v.currentTime = 0;
                    });
                },

                close: () => {
                    // стоп при закрытии
                    document.querySelectorAll("video").forEach(v => {
                        v.pause();
                    });
                }
            }

        });
    </script>
</body>

</html>
